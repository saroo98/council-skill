    <text x="632" y="861" fill="#111827" font-size="22" font-weight="800">When To Use</text>
    <line x1="580" y1="886" x2="1040" y2="886" stroke="#DFE5ED"/>
    <text x="596" y="925" fill="#64748B" font-size="19" font-weight="800">✓</text><text x="626" y="925" fill="#1F2937" font-size="17" font-weight="500">Before starting a feature or project</text>
    <text x="596" y="954" fill="#64748B" font-size="19" font-weight="800">✓</text><text x="626" y="954" fill="#1F2937" font-size="17" font-weight="500">Before redesigns, refactors, or migrations</text>
    <text x="596" y="983" fill="#64748B" font-size="19" font-weight="800">✓</text><text x="626" y="983" fill="#1F2937" font-size="17" font-weight="500">When requirements are unclear or changing</text>
    <text x="596" y="1012" fill="#64748B" font-size="19" font-weight="800">✓</text><text x="626" y="1012" fill="#1F2937" font-size="17" font-weight="500">When quality, safety, or operability matter</text>

