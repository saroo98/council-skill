    <text x="95" y="925" fill="#2F7D52" font-size="19" font-weight="800">✓</text><text x="125" y="925" fill="#1F2937" font-size="17" font-weight="500">Better decisions before implementation</text>
    <text x="95" y="954" fill="#2F7D52" font-size="19" font-weight="800">✓</text><text x="125" y="954" fill="#1F2937" font-size="17" font-weight="500">Fewer reworks and costly pivots</text>
    <text x="95" y="983" fill="#2F7D52" font-size="19" font-weight="800">✓</text><text x="125" y="983" fill="#1F2937" font-size="17" font-weight="500">Shared review across product, UX, code, ops</text>
    <text x="95" y="1012" fill="#2F7D52" font-size="19" font-weight="800">✓</text><text x="125" y="1012" fill="#1F2937" font-size="17" font-weight="500">Actionable implementation plan and next step</text>

