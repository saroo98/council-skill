    <text x="580" y="1144" fill="#1F2937" font-size="17" font-weight="500">Run Council from your agent workspace.</text>
    <rect x="580" y="1170" width="460" height="54" rx="8" fill="#F3F5F8"/>
    <text x="602" y="1204" fill="#64748B" font-size="17" font-weight="600">1</text><text x="638" y="1204" fill="#111827" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="600">/council</text>
