  <text x="80" y="425" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Council Skill is a reusable skill that brings four expert perspectives together before code is written.</text>
  <text x="80" y="457" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">It helps AI agents slow down, challenge assumptions, and produce a concrete implementation plan.</text>
  <line x1="80" y1="492" x2="1040" y2="492" stroke="#DFE5ED"/>

  <g filter="url(#cardShadow)">
    <rect x="80" y="522" width="230" height="270" rx="12" fill="url(#softBlue)" stroke="#DDE5EF"/>
    <circle cx="132" cy="580" r="34" fill="#E9EFFB"/>
