    <text x="100" y="696" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Checks workflows, rules,</text>
    <text x="100" y="724" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">constraints, expectations,</text>
    <text x="100" y="752" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">and domain edge cases.</text>
  </g>
