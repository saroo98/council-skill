    <text x="102" y="1204" fill="#64748B" font-size="17" font-weight="600">1</text><text x="138" y="1204" fill="#111827" font-family="SFMono-Regular, Consolas, monospace" font-size="18" font-weight="600">./install-both.sh</text>
    <text x="80" y="1280" fill="#1F2937" font-size="17" font-weight="500">Installs into your local skill folders with backups.</text>

