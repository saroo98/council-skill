    <text x="350" y="696" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Reviews flows, hierarchy,</text>
    <text x="350" y="724" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">accessibility, usability,</text>
    <text x="350" y="752" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">copy, and design quality.</text>
