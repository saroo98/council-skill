    <text x="600" y="724" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">state, maintainability,</text>
    <text x="600" y="752" fill="#1F2937" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">dependencies, complexity.</text>
